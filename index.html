<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liberty Pass Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ldpl-maroon: #800000;
      --ldpl-red: #cc0000;
      --ldpl-blue: #0047ab;
      --ldpl-black: #222222;
      --theme-primary: #800000;
      --theme-primary-dark: #600000;
      --theme-text: #222222;
      --theme-text-muted: #444444;
      --theme-body-bg: #ffffff;
      --theme-tag-bg: #f4f4f5;
      --theme-border: #cccccc;
      --theme-header-bg: #ffffff;
      --theme-footer-bg: #ffffff;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #e8e8ea;
      color: #18181b;
      min-height: 100vh;
    }

    .app {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .app-header { text-align: center; margin-bottom: 28px; }
    .app-header h1 { font-size: 1.45rem; font-weight: 800; }
    .app-header p { color: #71717a; margin-top: 6px; font-size: 0.92rem; }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) 440px;
      gap: 28px;
      align-items: start;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
    }

    .preview-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 16px;
    }

    .preview-label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #71717a;
    }

    .preview-wrap {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .size-note { font-size: 0.78rem; color: #a1a1aa; text-align: center; }

    .size-select-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .size-select-wrap label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #71717a;
    }

    .size-select-wrap select {
      padding: 8px 12px;
      border: 1.5px solid #d4d4d8;
      border-radius: 8px;
      font-size: 0.85rem;
      font-family: inherit;
      background: #fff;
      min-width: 220px;
      cursor: pointer;
    }

    .size-select-wrap select:focus {
      outline: none;
      border-color: #e60000;
    }

    /* ===== OFFICIAL PASS CARD ===== */
    .pass-card {
      width: var(--card-width, 75mm);
      height: var(--card-height, 100mm);
      background: #ffffff;
      border-radius: 3mm;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
      position: relative;
      flex-shrink: 0;
      border: 0.4mm solid #cccccc;
      font-family: Arial, Helvetica, sans-serif;
    }

    .pass-card::before {
      content: '';
      position: absolute;
      inset: 2mm;
      border: 0.45mm solid var(--theme-border);
      border-radius: 1.2mm;
      pointer-events: none;
      z-index: 1;
    }

    .pass-zone {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .pass-zone--header {
      background: var(--theme-header-bg);
      padding: 3.5mm 4mm 2mm;
      text-align: center;
      gap: 1.2mm;
      border-bottom: 0.3mm solid #dddddd;
    }

    .pass-zone--body {
      flex: 1;
      background: var(--theme-body-bg);
      padding: 2.5mm 4mm;
      gap: 2mm;
      justify-content: center;
    }

    .pass-zone--footer {
      background: var(--theme-footer-bg);
      padding: 2mm 4mm 2.5mm;
      text-align: center;
      gap: 1mm;
      border-top: 0.3mm solid #dddddd;
    }

    .card-field { width: 100%; }

    .card-field--logo {
      display: flex;
      justify-content: center;
    }

    .card-field--logo img {
      object-fit: cover;
      display: block;
      background: var(--ldpl-maroon);
    }

    .card-field--logo img.logo--circle {
      border-radius: 50%;
    }

    .card-field--logo img.logo--square {
      border-radius: 1.5mm;
    }

    .card-field--company-name .company-line {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0.02em;
    }

    .card-field--company-name .company-before,
    .card-field--company-name .company-after {
      color: var(--ldpl-black);
    }

    .card-field--company-name .company-highlight {
      color: var(--ldpl-red);
    }

    .card-field--text .field-label {
      display: block;
      font-size: 2.4mm;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1mm;
      color: #71717a;
    }

    .card-field--text .field-value {
      line-height: 1.25;
      word-break: break-word;
    }

    .card-field--tagbox {
      border: 0.4mm solid var(--theme-border);
      background: var(--theme-tag-bg);
      border-radius: 1.5mm;
      padding: 1.8mm 3mm;
      text-align: center;
    }

    .card-field--tagbox .field-value {
      line-height: 1.2;
    }

    .card-field--tagbox .tag-line + .tag-line {
      margin-top: 1mm;
    }

    /* ===== CONTROLS ===== */
    .controls {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      max-height: calc(100vh - 48px);
      overflow-y: auto;
    }

    .controls h2 {
      font-size: 0.95rem;
      font-weight: 700;
      margin: 18px 0 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e4e4e7;
    }

    .controls h2:first-child { margin-top: 0; }

    .field-block {
      border: 1.5px solid #e4e4e7;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fafafa;
    }

    .field-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .field-block-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: #3f3f46;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field-block-actions { display: flex; gap: 4px; }

    .icon-btn {
      width: 28px;
      height: 28px;
      border: 1px solid #d4d4d8;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      line-height: 1;
      color: #52525b;
    }

    .icon-btn:hover { background: #f4f4f5; }
    .icon-btn.danger:hover { background: #fef2f2; color: #dc2626; border-color: #fecaca; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .row-3 { grid-template-columns: 1fr 1fr 1fr; }

    label.mini {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: #71717a;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="date"],
    input[type="color"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid #d4d4d8;
      border-radius: 7px;
      font-size: 0.85rem;
      font-family: inherit;
    }

    textarea { min-height: 54px; resize: vertical; }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #e60000;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.82rem;
      color: #52525b;
    }

    .check-row input { width: auto; }

    .add-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }

    .btn {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-sm { padding: 8px 12px; font-size: 0.8rem; }

    .btn-primary { background: #e60000; color: #fff; }
    .btn-secondary { background: #18181b; color: #fff; }
    .btn-outline { background: #fff; color: #18181b; border: 1.5px solid #d4d4d8; }
    .btn:hover { opacity: 0.92; }

    .btn-row { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }

    .theme-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .theme-btn {
      padding: 9px 8px;
      border: 2px solid #e4e4e7;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.74rem;
      font-weight: 600;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
    }

    .theme-btn.active { border-color: #e60000; background: #fff5f5; }

    .theme-swatch {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.1);
      flex-shrink: 0;
    }

    .hint {
      font-size: 0.76rem;
      color: #a1a1aa;
      line-height: 1.45;
      margin-top: 8px;
    }

    .logo-preview {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #e4e4e7;
      margin-top: 6px;
    }

    /* ===== PRINT ===== */
    @media print {
      body {
        background: white !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .app-header, .controls, .preview-label, .size-note, .size-select-wrap { display: none !important; }
      .app { padding: 0; max-width: none; }
      .layout { display: block; }
      .preview-section { position: static; }
      .preview-wrap { padding: 0 !important; box-shadow: none !important; background: white !important; border-radius: 0 !important; }

      .pass-card {
        box-shadow: none !important;
        margin: 0 auto;
        page-break-inside: avoid;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        background: #ffffff !important;
        border: 0.5mm solid #18181b !important;
      }

      .pass-card::before { border-color: #d4d4d8 !important; }
      .pass-zone--header,
      .pass-zone--body,
      .pass-zone--footer {
        background: #fff !important;
      }
      .pass-zone--header { border-bottom: 0.3mm solid #999 !important; }
      .pass-zone--footer { border-top: 0.3mm solid #999 !important; }
      .card-field--logo img {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Liberty Pass Generator</h1>
      <p>Edit all fields live — reuse for any event. Add custom text or logo blocks, then print or download.</p>
    </header>

    <div class="layout">
      <section class="preview-section">
        <span class="preview-label">Live Preview</span>
        <div class="preview-wrap">
          <div class="pass-card" id="passCard">
            <div class="pass-zone pass-zone--header" id="zoneHeader"></div>
            <div class="pass-zone pass-zone--body" id="zoneBody"></div>
            <div class="pass-zone pass-zone--footer" id="zoneFooter"></div>
          </div>
        </div>
        <div class="size-select-wrap">
          <label for="pouchSize">Lamination pouch size</label>
          <select id="pouchSize">
            <option value="65x85">65mm × 85mm</option>
            <option value="70x90">70mm × 90mm</option>
            <option value="75x100" selected>75mm × 100mm (OLD ID)</option>
          </select>
        </div>
      </section>

      <aside class="controls">
        <h2>Card Fields</h2>
        <div class="add-row">
          <button class="btn btn-outline btn-sm" id="btnAddText">+ Text Field</button>
          <button class="btn btn-outline btn-sm" id="btnAddCompany">+ Company Name</button>
          <button class="btn btn-outline btn-sm" id="btnAddLogo">+ Logo Field</button>
          <button class="btn btn-outline btn-sm" id="btnAddTagBox">+ Tag Box</button>
          <button class="btn btn-outline btn-sm" id="btnReset">Reset Template</button>
        </div>
        <div id="fieldsEditor"></div>

        <h2>Theme Template</h2>
        <div class="theme-grid" id="themeGrid"></div>

        <div class="btn-row">
          <button class="btn btn-primary" id="btnPrint">Print Pass</button>
          <button class="btn btn-secondary" id="btnDownload">Download PNG (Print Ready)</button>
          <button class="btn btn-outline" id="btnDownloadThemed">Download PNG (Themed)</button>
        </div>
        <p class="hint">Official LDPL letterhead colors are preserved on print (maroon logo, red DAHARKI, blue facility lines).</p>
      </aside>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    const DEFAULT_LOGO = 'assets/liberty-logo.jpeg';
    const OFFICIAL = {
      maroon: '#800000',
      red: '#cc0000',
      blue: '#0047ab',
      black: '#222222'
    };
    let fieldIdCounter = 0;
    let currentTheme = 'liberty-official';
    let currentPouchSize = '75x100';

    const POUCH_SIZES = {
      '65x85': { width: 65, height: 85, label: '65mm × 85mm' },
      '70x90': { width: 70, height: 90, label: '70mm × 90mm' },
      '75x100': { width: 75, height: 100, label: '75mm × 100mm (OLD ID)' }
    };

    function getSizeScale() {
      return POUCH_SIZES[currentPouchSize].height / 100;
    }

    function scaleMm(val) {
      return (val * getSizeScale()).toFixed(2);
    }

    function applyPouchSize(key) {
      currentPouchSize = key;
      const { width, height } = POUCH_SIZES[key];
      passCard.style.setProperty('--card-width', width + 'mm');
      passCard.style.setProperty('--card-height', height + 'mm');

      let printStyle = document.getElementById('printPageStyle');
      if (!printStyle) {
        printStyle = document.createElement('style');
        printStyle.id = 'printPageStyle';
        document.head.appendChild(printStyle);
      }
      printStyle.textContent = `@media print { @page { size: ${width}mm ${height}mm; margin: 0; } }`;

      renderCard();
    }

    const themes = {
      'liberty-official': {
        '--theme-primary': '#800000',
        '--theme-primary-dark': '#600000',
        '--theme-text': '#222222',
        '--theme-text-muted': '#444444',
        '--theme-body-bg': '#ffffff',
        '--theme-tag-bg': '#f4f4f5',
        '--theme-border': '#cccccc',
        '--theme-header-bg': '#ffffff',
        '--theme-footer-bg': '#ffffff'
      },
      'liberty-red': {
        '--theme-primary': '#cc0000',
        '--theme-primary-dark': '#990000',
        '--theme-text': '#222222',
        '--theme-text-muted': '#444444',
        '--theme-body-bg': '#fff5f5',
        '--theme-tag-bg': '#ffe4e4',
        '--theme-border': '#cc0000',
        '--theme-header-bg': '#ffffff',
        '--theme-footer-bg': '#ffffff'
      },
      'deep-maroon': {
        '--theme-primary': '#800000',
        '--theme-primary-dark': '#600000',
        '--theme-text': '#222222',
        '--theme-text-muted': '#444444',
        '--theme-body-bg': '#fef2f2',
        '--theme-tag-bg': '#fce8e8',
        '--theme-border': '#800000',
        '--theme-header-bg': '#ffffff',
        '--theme-footer-bg': '#ffffff'
      },
      'navy': {
        '--theme-primary': '#1e3a5f',
        '--theme-primary-dark': '#152a45',
        '--theme-text': '#222222',
        '--theme-text-muted': '#444444',
        '--theme-body-bg': '#f0f4f8',
        '--theme-tag-bg': '#e8eef5',
        '--theme-border': '#1e3a5f',
        '--theme-header-bg': '#ffffff',
        '--theme-footer-bg': '#ffffff'
      },
      'forest': {
        '--theme-primary': '#14532d',
        '--theme-primary-dark': '#0d3320',
        '--theme-text': '#222222',
        '--theme-text-muted': '#444444',
        '--theme-body-bg': '#f0fdf4',
        '--theme-tag-bg': '#dcfce7',
        '--theme-border': '#14532d',
        '--theme-header-bg': '#ffffff',
        '--theme-footer-bg': '#ffffff'
      },
      'classic-black': {
        '--theme-primary': '#18181b',
        '--theme-primary-dark': '#09090b',
        '--theme-text': '#222222',
        '--theme-text-muted': '#444444',
        '--theme-body-bg': '#f4f4f5',
        '--theme-tag-bg': '#e4e4e7',
        '--theme-border': '#18181b',
        '--theme-header-bg': '#ffffff',
        '--theme-footer-bg': '#ffffff'
      }
    };

    const themeLabels = {
      'liberty-official': ['#800000', 'Liberty Official'],
      'liberty-red': ['#cc0000', 'Liberty Red'],
      'deep-maroon': ['#800000', 'Deep Maroon'],
      'navy': ['#1e3a5f', 'Navy Blue'],
      'forest': ['#14532d', 'Forest Green'],
      'classic-black': ['#18181b', 'Classic Black']
    };

    function nextId() {
      fieldIdCounter += 1;
      return 'f' + fieldIdCounter;
    }

    function defaultFields() {
      fieldIdCounter = 0;
      return [
        {
          id: nextId(), type: 'logo', zone: 'header',
          src: DEFAULT_LOGO, sizeMm: 11, align: 'center',
          shape: 'circle', bgColor: OFFICIAL.maroon
        },
        {
          id: nextId(), type: 'company-name', zone: 'header',
          before: 'LIBERTY ', highlight: 'DAHARKI', after: ' POWER LTD.',
          fontSize: 2.6, align: 'center',
          baseColor: OFFICIAL.black, highlightColor: OFFICIAL.red
        },
        {
          id: nextId(), type: 'text', zone: 'header',
          text: '235MW COMBINED CYCLE POWER PLANT',
          label: '', showLabel: false,
          fontSize: 1.75, fontWeight: 700, align: 'center',
          color: 'official-blue', uppercase: true, letterSpacing: 0.02
        },
        {
          id: nextId(), type: 'text', zone: 'header',
          text: 'MIRPUR MATHELO, DISTRICT GHOTKI, SINDH, PAKISTAN',
          label: '', showLabel: false,
          fontSize: 1.55, fontWeight: 700, align: 'center',
          color: 'official-blue', uppercase: true, letterSpacing: 0.02
        },
        {
          id: nextId(), type: 'tagbox', zone: 'body',
          lines: ['Invigilator', 'Trade Apprentice Test'],
          fontSizes: [3.8, 2.4], fontWeights: [800, 700],
          colors: ['theme-primary', 'dark'], uppercase: [true, true],
          letterSpacings: [0.1, 0.04]
        },
        {
          id: nextId(), type: 'text', zone: 'body',
          text: 'Enter Name Here',
          label: 'Name', showLabel: true,
          fontSize: 4.2, fontWeight: 800, align: 'center',
          color: 'dark', uppercase: false, letterSpacing: 0
        },
        {
          id: nextId(), type: 'text', zone: 'footer',
          text: '(dt: 17.06.2026)',
          label: '', showLabel: false,
          fontSize: 2.8, fontWeight: 700, align: 'center',
          color: 'dark', uppercase: false, letterSpacing: 0
        }
      ];
    }

    let fields = defaultFields();

    const passCard = document.getElementById('passCard');
    const zoneHeader = document.getElementById('zoneHeader');
    const zoneBody = document.getElementById('zoneBody');
    const zoneFooter = document.getElementById('zoneFooter');
    const fieldsEditor = document.getElementById('fieldsEditor');

    function resolveColor(colorKey, customColor) {
      const map = {
        'theme-text': 'var(--theme-text)',
        'theme-primary': 'var(--theme-primary)',
        'theme-text-muted': 'var(--theme-text-muted)',
        'official-blue': OFFICIAL.blue,
        'official-red': OFFICIAL.red,
        'official-maroon': OFFICIAL.maroon,
        'dark': OFFICIAL.black,
        'muted': '#71717a',
        'white': '#ffffff',
        'custom': customColor || OFFICIAL.black
      };
      return map[colorKey] || colorKey;
    }

    function textStyle(f) {
      return `
        font-family: Arial, Helvetica, sans-serif;
        font-size:${scaleMm(f.fontSize)}mm;
        font-weight:${f.fontWeight};
        text-align:${f.align};
        color:${resolveColor(f.color, f.customColor)};
        text-transform:${f.uppercase ? 'uppercase' : 'none'};
        letter-spacing:${f.letterSpacing}em;
      `;
    }

    function renderCardField(f) {
      if (f.type === 'logo') {
        const justify = f.align === 'left' ? 'flex-start' : f.align === 'right' ? 'flex-end' : 'center';
        const shapeClass = f.shape === 'square' ? 'logo--square' : 'logo--circle';
        const bg = f.bgColor || OFFICIAL.maroon;
        return `
          <div class="card-field card-field--logo" data-id="${f.id}" style="justify-content:${justify}">
            <img class="${shapeClass}" src="${f.src}" alt="Liberty Logo"
              style="width:${scaleMm(f.sizeMm)}mm;height:${scaleMm(f.sizeMm)}mm;background:${bg}">
          </div>`;
      }

      if (f.type === 'company-name') {
        const align = f.align || 'center';
        return `
          <div class="card-field card-field--company-name" data-id="${f.id}">
            <div class="company-line" style="font-size:${scaleMm(f.fontSize)}mm;text-align:${align}">
              <span class="company-before" style="color:${f.baseColor || OFFICIAL.black}">${escapeHtml(f.before)}</span><span class="company-highlight" style="color:${f.highlightColor || OFFICIAL.red}">${escapeHtml(f.highlight)}</span><span class="company-after" style="color:${f.baseColor || OFFICIAL.black}">${escapeHtml(f.after)}</span>
            </div>
          </div>`;
      }

      if (f.type === 'tagbox') {
        const lines = f.lines.map((line, i) => {
          const style = `
            font-size:${scaleMm(f.fontSizes[i] || 3.5)}mm;
            font-weight:${f.fontWeights[i] || 700};
            color:${resolveColor(f.colors[i] || 'theme-primary', f.customColors?.[i])};
            text-transform:${f.uppercase[i] ? 'uppercase' : 'none'};
            letter-spacing:${(f.letterSpacings[i] || 0.08)}em;
          `;
          return `<div class="tag-line field-value" style="${style}">${escapeHtml(line) || '&nbsp;'}</div>`;
        }).join('');
        return `<div class="card-field card-field--tagbox" data-id="${f.id}">${lines}</div>`;
      }

      const label = f.showLabel && f.label
        ? `<span class="field-label">${escapeHtml(f.label)}</span>` : '';
      return `
        <div class="card-field card-field--text" data-id="${f.id}">
          ${label}
          <div class="field-value" style="${textStyle(f)}">${escapeHtml(f.text) || '&nbsp;'}</div>
        </div>`;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderCard() {
      const zones = { header: [], body: [], footer: [] };
      fields.forEach(f => zones[f.zone].push(renderCardField(f)));
      zoneHeader.innerHTML = zones.header.join('');
      zoneBody.innerHTML = zones.body.join('');
      zoneFooter.innerHTML = zones.footer.join('');
    }

    function colorOptions(selected) {
      const opts = [
        ['official-blue', 'Official Blue'],
        ['official-red', 'Official Red'],
        ['official-maroon', 'Official Maroon'],
        ['theme-primary', 'Theme Primary'],
        ['dark', 'Black'],
        ['theme-text', 'Theme Text'],
        ['theme-text-muted', 'Theme Muted'],
        ['muted', 'Gray'],
        ['white', 'White'],
        ['custom', 'Custom']
      ];
      return opts.map(([v, l]) => `<option value="${v}" ${selected === v ? 'selected' : ''}>${l}</option>`).join('');
    }

    function zoneOptions(selected) {
      return ['header', 'body', 'footer']
        .map(z => `<option value="${z}" ${selected === z ? 'selected' : ''}>${z.charAt(0).toUpperCase() + z.slice(1)}</option>`)
        .join('');
    }

    function alignOptions(selected) {
      return ['left', 'center', 'right']
        .map(a => `<option value="${a}" ${selected === a ? 'selected' : ''}>${a}</option>`)
        .join('');
    }

    function weightOptions(selected) {
      return [400, 500, 600, 700, 800]
        .map(w => `<option value="${w}" ${Number(selected) === w ? 'selected' : ''}>${w}</option>`)
        .join('');
    }

    function renderTextEditor(f, index) {
      return `
        <div class="field-block" data-index="${index}">
          <div class="field-block-header">
            <span class="field-block-title">Text · ${f.zone}</span>
            <div class="field-block-actions">
              <button class="icon-btn" data-action="up" title="Move up">↑</button>
              <button class="icon-btn" data-action="down" title="Move down">↓</button>
              <button class="icon-btn danger" data-action="remove" title="Remove">✕</button>
            </div>
          </div>
          <label class="mini">Text (live on card)</label>
          <textarea data-key="text">${escapeHtml(f.text)}</textarea>
          <div class="row">
            <div>
              <label class="mini">Zone</label>
              <select data-key="zone">${zoneOptions(f.zone)}</select>
            </div>
            <div>
              <label class="mini">Align</label>
              <select data-key="align">${alignOptions(f.align)}</select>
            </div>
          </div>
          <div class="row row-3">
            <div>
              <label class="mini">Size (mm)</label>
              <input type="number" data-key="fontSize" min="2" max="10" step="0.1" value="${f.fontSize}">
            </div>
            <div>
              <label class="mini">Weight</label>
              <select data-key="fontWeight">${weightOptions(f.fontWeight)}</select>
            </div>
            <div>
              <label class="mini">Color</label>
              <select data-key="color">${colorOptions(f.color)}</select>
            </div>
          </div>
          <div class="row">
            <div>
              <label class="mini">Letter spacing (em)</label>
              <input type="number" data-key="letterSpacing" min="0" max="0.3" step="0.01" value="${f.letterSpacing}">
            </div>
            <div>
              <label class="mini">Custom color</label>
              <input type="color" data-key="customColor" value="${f.customColor || '#18181b'}">
            </div>
          </div>
          <label class="check-row"><input type="checkbox" data-key="showLabel" ${f.showLabel ? 'checked' : ''}> Show label above text</label>
          <label class="mini">Label text</label>
          <input type="text" data-key="label" value="${escapeHtml(f.label || '')}" placeholder="e.g. Name">
          <label class="check-row"><input type="checkbox" data-key="uppercase" ${f.uppercase ? 'checked' : ''}> UPPERCASE</label>
        </div>`;
    }

    function renderCompanyEditor(f, index) {
      return `
        <div class="field-block" data-index="${index}">
          <div class="field-block-header">
            <span class="field-block-title">Company Name · ${f.zone}</span>
            <div class="field-block-actions">
              <button class="icon-btn" data-action="up">↑</button>
              <button class="icon-btn" data-action="down">↓</button>
              <button class="icon-btn danger" data-action="remove">✕</button>
            </div>
          </div>
          <p class="hint" style="margin:0 0 8px">Official format: LIBERTY <span style="color:${OFFICIAL.red}">DAHARKI</span> POWER LTD.</p>
          <label class="mini">Before highlight (e.g. "LIBERTY ")</label>
          <input type="text" data-key="before" value="${escapeHtml(f.before)}">
          <label class="mini">Highlighted word (e.g. "DAHARKI")</label>
          <input type="text" data-key="highlight" value="${escapeHtml(f.highlight)}">
          <label class="mini">After highlight (e.g. " POWER LTD.")</label>
          <input type="text" data-key="after" value="${escapeHtml(f.after)}">
          <div class="row row-3">
            <div>
              <label class="mini">Size (mm)</label>
              <input type="number" data-key="fontSize" min="2" max="8" step="0.1" value="${f.fontSize}">
            </div>
            <div>
              <label class="mini">Align</label>
              <select data-key="align">${alignOptions(f.align)}</select>
            </div>
            <div>
              <label class="mini">Zone</label>
              <select data-key="zone">${zoneOptions(f.zone)}</select>
            </div>
          </div>
          <div class="row">
            <div>
              <label class="mini">Base color (LIBERTY / POWER LTD.)</label>
              <input type="color" data-key="baseColor" value="${f.baseColor || OFFICIAL.black}">
            </div>
            <div>
              <label class="mini">Highlight color (DAHARKI)</label>
              <input type="color" data-key="highlightColor" value="${f.highlightColor || OFFICIAL.red}">
            </div>
          </div>
        </div>`;
    }

    function renderLogoEditor(f, index) {
      return `
        <div class="field-block" data-index="${index}">
          <div class="field-block-header">
            <span class="field-block-title">Logo · ${f.zone}</span>
            <div class="field-block-actions">
              <button class="icon-btn" data-action="up">↑</button>
              <button class="icon-btn" data-action="down">↓</button>
              <button class="icon-btn danger" data-action="remove">✕</button>
            </div>
          </div>
          <div class="row">
            <div>
              <label class="mini">Zone</label>
              <select data-key="zone">${zoneOptions(f.zone)}</select>
            </div>
            <div>
              <label class="mini">Align</label>
              <select data-key="align">${alignOptions(f.align)}</select>
            </div>
          </div>
          <div class="row">
            <div>
              <label class="mini">Size (mm)</label>
              <input type="number" data-key="sizeMm" min="10" max="35" step="1" value="${f.sizeMm}">
            </div>
            <div>
              <label class="mini">Shape</label>
              <select data-key="shape">
                <option value="circle" ${f.shape !== 'square' ? 'selected' : ''}>Circle (Official)</option>
                <option value="square" ${f.shape === 'square' ? 'selected' : ''}>Square</option>
              </select>
            </div>
          </div>
          <label class="mini">Logo background (maroon)</label>
          <input type="color" data-key="bgColor" value="${f.bgColor || OFFICIAL.maroon}">
          <label class="mini">Upload logo image</label>
          <input type="file" accept="image/*" data-key="logoFile">
          <img class="logo-preview" src="${f.src}" alt="Logo preview">
        </div>`;
    }

    function renderTagBoxEditor(f, index) {
      const lineCount = Math.max(2, f.lines.length);
      const linesHtml = f.lines.map((line, i) => `
        <label class="mini">Line ${i + 1}</label>
        <input type="text" data-tag-line="${i}" value="${escapeHtml(line)}">
        <div class="row row-3">
          <div>
            <label class="mini">Size (mm)</label>
            <input type="number" data-tag-size="${i}" min="2" max="8" step="0.1" value="${f.fontSizes[i] || 3.5}">
          </div>
          <div>
            <label class="mini">Weight</label>
            <select data-tag-weight="${i}">${weightOptions(f.fontWeights[i] || 700)}</select>
          </div>
          <div>
            <label class="mini">Color</label>
            <select data-tag-color="${i}">${colorOptions(f.colors[i] || 'theme-primary')}</select>
          </div>
        </div>
        <label class="check-row"><input type="checkbox" data-tag-upper="${i}" ${f.uppercase[i] ? 'checked' : ''}> UPPERCASE</label>
      `).join('');

      return `
        <div class="field-block" data-index="${index}">
          <div class="field-block-header">
            <span class="field-block-title">Tag Box · ${f.zone}</span>
            <div class="field-block-actions">
              <button class="icon-btn" data-action="up">↑</button>
              <button class="icon-btn" data-action="down">↓</button>
              <button class="icon-btn danger" data-action="remove">✕</button>
            </div>
          </div>
          <div class="row">
            <div>
              <label class="mini">Zone</label>
              <select data-key="zone">${zoneOptions(f.zone)}</select>
            </div>
            <div>
              <label class="mini">Lines</label>
              <select data-key="lineCount">
                ${[2,3,4].map(n => `<option value="${n}" ${lineCount === n ? 'selected' : ''}>${n}</option>`).join('')}
              </select>
            </div>
          </div>
          ${linesHtml}
        </div>`;
    }

    function renderEditors() {
      fieldsEditor.innerHTML = fields.map((f, i) => {
        if (f.type === 'logo') return renderLogoEditor(f, i);
        if (f.type === 'company-name') return renderCompanyEditor(f, i);
        if (f.type === 'tagbox') return renderTagBoxEditor(f, i);
        return renderTextEditor(f, i);
      }).join('');
    }

    function renderThemeButtons() {
      document.getElementById('themeGrid').innerHTML = Object.entries(themeLabels).map(([id, [color, label]]) => `
        <button class="theme-btn ${currentTheme === id ? 'active' : ''}" data-theme="${id}">
          <span class="theme-swatch" style="background:${color}"></span>
          ${label}
        </button>
      `).join('');
    }

    function applyTheme(themeId) {
      currentTheme = themeId;
      Object.entries(themes[themeId]).forEach(([k, v]) => passCard.style.setProperty(k, v));
      renderThemeButtons();
    }

    function moveField(index, dir) {
      const next = index + dir;
      if (next < 0 || next >= fields.length) return;
      [fields[index], fields[next]] = [fields[next], fields[index]];
      renderAll();
    }

    function removeField(index) {
      fields.splice(index, 1);
      renderAll();
    }

    function renderAll() {
      renderCard();
      renderEditors();
    }

    fieldsEditor.addEventListener('input', (e) => {
      const block = e.target.closest('.field-block');
      if (!block) return;
      const index = Number(block.dataset.index);
      const f = fields[index];
      const key = e.target.dataset.key;

      if (key === 'text') { f.text = e.target.value; renderCard(); return; }
      if (key === 'before') { f.before = e.target.value; renderCard(); return; }
      if (key === 'highlight') { f.highlight = e.target.value; renderCard(); return; }
      if (key === 'after') { f.after = e.target.value; renderCard(); return; }
      if (key === 'baseColor') { f.baseColor = e.target.value; renderCard(); return; }
      if (key === 'highlightColor') { f.highlightColor = e.target.value; renderCard(); return; }
      if (key === 'bgColor') { f.bgColor = e.target.value; renderCard(); return; }
      if (key === 'shape') { f.shape = e.target.value; renderCard(); return; }
      if (key === 'label') { f.label = e.target.value; renderCard(); return; }
      if (key === 'zone') { f.zone = e.target.value; renderEditors(); renderCard(); return; }
      if (key === 'align') { f.align = e.target.value; renderCard(); return; }
      if (key === 'fontSize') { f.fontSize = parseFloat(e.target.value) || 3; renderCard(); return; }
      if (key === 'fontWeight') { f.fontWeight = Number(e.target.value); renderCard(); return; }
      if (key === 'color') { f.color = e.target.value; renderCard(); return; }
      if (key === 'customColor') { f.customColor = e.target.value; renderCard(); return; }
      if (key === 'letterSpacing') { f.letterSpacing = parseFloat(e.target.value) || 0; renderCard(); return; }
      if (key === 'sizeMm') { f.sizeMm = parseFloat(e.target.value) || 20; renderCard(); return; }

      if (key === 'lineCount') {
        const count = Number(e.target.value);
        while (f.lines.length < count) {
          f.lines.push('New Line');
          f.fontSizes.push(3.5);
          f.fontWeights.push(600);
          f.colors.push('dark');
          f.uppercase.push(false);
          f.letterSpacings.push(0.05);
        }
        f.lines = f.lines.slice(0, count);
        f.fontSizes = f.fontSizes.slice(0, count);
        f.fontWeights = f.fontWeights.slice(0, count);
        f.colors = f.colors.slice(0, count);
        f.uppercase = f.uppercase.slice(0, count);
        f.letterSpacings = f.letterSpacings.slice(0, count);
        renderEditors();
        renderCard();
        return;
      }

      const tagLine = e.target.dataset.tagLine;
      if (tagLine !== undefined) {
        f.lines[Number(tagLine)] = e.target.value;
        renderCard();
        return;
      }
      const tagSize = e.target.dataset.tagSize;
      if (tagSize !== undefined) {
        f.fontSizes[Number(tagSize)] = parseFloat(e.target.value) || 3.5;
        renderCard();
        return;
      }
      const tagWeight = e.target.dataset.tagWeight;
      if (tagWeight !== undefined) {
        f.fontWeights[Number(tagWeight)] = Number(e.target.value);
        renderCard();
        return;
      }
      const tagColor = e.target.dataset.tagColor;
      if (tagColor !== undefined) {
        f.colors[Number(tagColor)] = e.target.value;
        renderCard();
        return;
      }
    });

    fieldsEditor.addEventListener('change', (e) => {
      const block = e.target.closest('.field-block');
      if (!block) return;
      const index = Number(block.dataset.index);
      const f = fields[index];
      const key = e.target.dataset.key;

      if (key === 'showLabel') { f.showLabel = e.target.checked; renderCard(); return; }
      if (key === 'uppercase') { f.uppercase = e.target.checked; renderCard(); return; }

      const tagUpper = e.target.dataset.tagUpper;
      if (tagUpper !== undefined) {
        f.uppercase[Number(tagUpper)] = e.target.checked;
        renderCard();
        return;
      }

      if (key === 'logoFile' && e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          f.src = ev.target.result;
          block.querySelector('.logo-preview').src = f.src;
          renderCard();
        };
        reader.readAsDataURL(e.target.files[0]);
      }
    });

    fieldsEditor.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const block = btn.closest('.field-block');
      const index = Number(block.dataset.index);
      if (btn.dataset.action === 'up') moveField(index, -1);
      if (btn.dataset.action === 'down') moveField(index, 1);
      if (btn.dataset.action === 'remove') removeField(index);
    });

    document.getElementById('btnAddText').addEventListener('click', () => {
      fields.push({
        id: nextId(), type: 'text', zone: 'body',
        text: 'New Text', label: '', showLabel: false,
        fontSize: 4, fontWeight: 700, align: 'center',
        color: 'dark', uppercase: false, letterSpacing: 0, customColor: '#18181b'
      });
      renderAll();
    });

    document.getElementById('btnAddCompany').addEventListener('click', () => {
      fields.push({
        id: nextId(), type: 'company-name', zone: 'header',
        before: 'LIBERTY ', highlight: 'DAHARKI', after: ' POWER LTD.',
        fontSize: 3.4, align: 'center',
        baseColor: OFFICIAL.black, highlightColor: OFFICIAL.red
      });
      renderAll();
    });

    document.getElementById('btnAddLogo').addEventListener('click', () => {
      fields.push({
        id: nextId(), type: 'logo', zone: 'header',
        src: DEFAULT_LOGO, sizeMm: 11, align: 'center',
        shape: 'circle', bgColor: OFFICIAL.maroon
      });
      renderAll();
    });

    document.getElementById('btnAddTagBox').addEventListener('click', () => {
      fields.push({
        id: nextId(), type: 'tagbox', zone: 'body',
        lines: ['Role Title', 'Event Name'],
        fontSizes: [5, 3.2], fontWeights: [800, 600],
        colors: ['theme-primary', 'dark'], uppercase: [true, true],
        letterSpacings: [0.1, 0.04]
      });
      renderAll();
    });

    document.getElementById('btnReset').addEventListener('click', () => {
      if (confirm('Reset to default Invigilator pass template?')) {
        fields = defaultFields();
        renderAll();
      }
    });

    document.getElementById('themeGrid').addEventListener('click', (e) => {
      const btn = e.target.closest('.theme-btn');
      if (btn) applyTheme(btn.dataset.theme);
    });

    const printThemeVars = {
      '--theme-body-bg': '#ffffff',
      '--theme-tag-bg': '#f4f4f5',
      '--theme-border': '#999999',
      '--theme-header-bg': '#ffffff',
      '--theme-footer-bg': '#ffffff'
    };

    function applyPrintTheme() {
      Object.entries(printThemeVars).forEach(([k, v]) => passCard.style.setProperty(k, v));
      passCard.style.background = '#ffffff';
      passCard.style.border = '2px solid #18181b';
    }

    function restoreTheme() {
      applyTheme(currentTheme);
      passCard.style.background = '';
      passCard.style.border = '';
      renderCard();
    }

    function getNameForFile() {
      const nameField = fields.find(f => f.type === 'text' && f.showLabel && /name/i.test(f.label));
      const text = nameField?.text?.trim() || fields.find(f => f.type === 'text' && f.zone === 'body')?.text?.trim();
      return (text || 'pass').replace(/\s+/g, '-');
    }

    document.getElementById('btnPrint').addEventListener('click', () => window.print());

    async function downloadCard(printReady) {
      if (printReady) applyPrintTheme();
      try {
        const canvas = await html2canvas(passCard, {
          scale: 3,
          useCORS: true,
          allowTaint: true,
          backgroundColor: printReady ? '#ffffff' : null,
          logging: false
        });
        const link = document.createElement('a');
        link.download = `liberty-pass-${getNameForFile()}${printReady ? '-print' : ''}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (err) {
        alert('Download failed. Please try again.');
        console.error(err);
      } finally {
        if (printReady) restoreTheme();
      }
    }

    document.getElementById('btnDownload').addEventListener('click', () => downloadCard(true));
    document.getElementById('btnDownloadThemed').addEventListener('click', () => downloadCard(false));

    document.getElementById('pouchSize').addEventListener('change', (e) => {
      applyPouchSize(e.target.value);
    });

    renderThemeButtons();
    applyTheme('liberty-official');
    applyPouchSize('75x100');
    renderAll();
  </script>
</body>
</html>
